<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Release</title>
</head>
<body>
    <h1>Latest GitHub Release</h1>
    <div id="release"></div>

    <script>
        fetch('https://api.github.com/repos/jeremiablut/Eclipse-Docs/releases/latest')
            .then(response => response.json())
            .then(data => {
                const releaseDiv = document.getElementById('release');
                releaseDiv.innerHTML = `<h2>${data.name}</h2><p>${data.body}</p>`;
            })
            .catch(error => {
                console.error('Error fetching release data:', error);
            });
    </script>
</body>
</html>
